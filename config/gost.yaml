# gost v3 配置文件：白名单目标走上游 SOCKS5，其他目标走本机网络

services:
  - name: http-proxy
    addr: "127.0.0.1:8080"
    handler:
      type: http
      chain: proxy-chain
    listener:
      type: tcp

chains:
  - name: proxy-chain
    hops:
      - name: proxy-hop
        bypass: proxy-whitelist
        nodes:
          - name: proxy-node
            addr: "10.144.144.3:1080"
            connector:
              type: socks5
            dialer:
              type: tcp

bypasses:
  - name: proxy-whitelist
    whitelist: true
    matchers:
      # GitHub
      - ".github.com"
      - ".githubusercontent.com"
      - ".githubassets.com"

      # Google
      - ".google.com"
      - ".google.com.hk"
      - ".gstatic.com"
      - ".googleapis.com"
      - ".googleusercontent.com"
      - ".ggpht.com"
      - ".youtube.com"
      - ".ytimg.com"
      - ".googlevideo.com"

      # OpenAI / ChatGPT core
      - ".openai.com"
      - ".chatgpt.com"
      - ".oaistatic.com"
      - ".oaiusercontent.com"

      # OpenAI / ChatGPT supporting services
      - "ws.chatgpt.com"
      - "challenges.cloudflare.com"
      - ".statsig.com"
      - ".statsigapi.net"
      - ".featuregates.org"
      - ".featureassets.org"
      - ".workos.com"
      - ".workoscdn.com"
      - "cdn.openaimerge.com"
      - ".intercom.io"
      - ".intercomcdn.com"
      - "js.stripe.com"

      - "rustdesk.com"
