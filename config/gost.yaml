# gost v3 配置文件：白名单目标走上游 SOCKS5，其他目标走本机网络

services:
  - name: http-proxy
    addr: "127.0.0.1:8080"
    handler:
      type: http
      chain: proxy-chain
    listener:
      type: tcp

chains:
  - name: proxy-chain
    hops:
      - name: proxy-hop
        bypass: proxy-whitelist
        nodes:
          - name: proxy-node
            addr: "10.144.144.3:1080"
            connector:
              type: socks5
            dialer:
              type: tcp

bypasses:
  - name: proxy-whitelist
    whitelist: true
    matchers:
      - "*.github.com"
      - "github.com"
      - "*.google.com.hk"
      - "google.com.hk"
      - "*.openai.com"
      - "openai.com"
      - "*.chatgpt.com"
      - "chatgpt.com"
