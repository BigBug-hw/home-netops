# vpn中的身份
hostname = "ali"
instance_name = "ali.net.bigbug.ren"

# 静态IP
dhcp = false
ipv4 = "10.144.144.3"

# 共享节点监听
listeners = [
    "tcp://0.0.0.0:11010",
    "udp://0.0.0.0:11010",
    "ws://0.0.0.0:11011",
    "wss://0.0.0.0:11012",
]
tcp_whitelist = []
udp_whitelist = []

# 管理 RPC 监听地址；只本机管理更安全
rpc_portal = "127.0.0.1:15888"
rpc_portal_whitelist = ["127.0.0.1/32"]

[network_identity]
network_name = "net.bigbug.ren"
network_secret = "REPLACE_WITH_ROTATED_NETWORK_SECRET"

[flags]
need_p2p = true
private_mode = true

[secure_mode]
enabled = true
local_private_key = "REPLACE_WITH_ROTATED_ALI_PRIVATE_KEY"
local_public_key = "REPLACE_WITH_ROTATED_ALI_PUBLIC_KEY"

[[peer]]
uri = "tcp://82.156.118.129:11010"
peer_public_key = "REPLACE_WITH_ROTATED_TENCENT_PUBLIC_KEY"
